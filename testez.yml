---
# Selene standard library for TestEZ globals (used by tests/*.spec.luau).
# Referenced from selene.toml via  std = "roblox+testez".
base: lua51
globals:
  afterAll:
    args:
      - type: function
  afterEach:
    args:
      - type: function
  beforeAll:
    args:
      - type: function
  beforeEach:
    args:
      - type: function
  describe:
    args:
      - type: string
      - type: function
  describeFOCUS:
    args:
      - type: string
      - type: function
  describeSKIP:
    args:
      - type: string
      - type: function
  expect:
    args:
      - type: any
  FIXME:
    args:
      - type: string
        required: false
  FOCUS:
    args: []
  it:
    args:
      - type: string
      - type: function
  itFIXME:
    args:
      - type: string
      - type: function
  itFOCUS:
    args:
      - type: string
      - type: function
  itSKIP:
    args:
      - type: string
      - type: function
  SKIP:
    args: []
